<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TEZZA VIP</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',sans-serif;}
body{background:#0b0f18;color:white;overflow-x:hidden;}
canvas{position:fixed;top:0;left:0;z-index:-2}

/* Floating particles */
.particle{
  position:fixed;
  width:3px;height:3px;
  background:gold;
  border-radius:50%;
  opacity:0.6;
  animation:float 10s linear infinite;
  z-index:-1;
}
@keyframes float{
  from{transform:translateY(100vh);}
  to{transform:translateY(-10vh);}
}

/* Container */
.container{
  max-width:450px;
  margin:70px auto;
  padding:35px 28px;
  border-radius:25px;
  background:rgba(20,20,25,0.88);
  backdrop-filter:blur(20px);
  box-shadow:0 0 60px rgba(255,215,0,0.25);
  text-align:center;
  animation:fadeIn 1.2s ease;
}
@keyframes fadeIn{
  from{opacity:0;transform:translateY(30px);}
  to{opacity:1;transform:translateY(0);}
}

/* Title */
h1{
  font-size:28px;
  margin-bottom:15px;
  background:linear-gradient(90deg,gold,#fff,gold);
  background-size:200% auto;
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  animation:shineText 3s linear infinite;
}
@keyframes shineText{
  to{background-position:200% center;}
}

/* Logo */
.logo-wrapper{
  position:relative;
  width:130px;
  height:130px;
  margin:25px auto;
}
.logo-wrapper::before{
  content:'';
  position:absolute;
  inset:-8px;
  border-radius:50%;
  border:3px solid transparent;
  border-top:3px solid gold;
  border-bottom:3px solid gold;
  animation:rotateRing 4s linear infinite;
}
@keyframes rotateRing{
  to{transform:rotate(360deg);}
}
.vip-logo{
  width:100%;
  height:100%;
  border-radius:50%;
  object-fit:cover;
  border:3px solid gold;
  box-shadow:0 0 25px rgba(255,215,0,0.7);
  animation:floatLogo 3s ease-in-out infinite;
}
@keyframes floatLogo{
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-8px);}
}

/* Text */
.subtitle{color:#ccc;font-size:14px;margin-bottom:20px;}
.profit{color:#00ff99;font-weight:bold;margin:15px 0;}
.timer{color:#ff4d4d;font-weight:bold;margin-bottom:20px;}

/* Buttons */
.btn{
  width:100%;
  padding:16px;
  border:none;
  border-radius:14px;
  font-size:16px;
  font-weight:bold;
  cursor:pointer;
  margin-top:18px;
  transition:0.3s;
}
.join-btn{
  background:gold;color:black;
}
.join-btn:hover{transform:scale(1.05);}
.register-btn{
  background:transparent;
  border:2px solid gold;
  color:gold;
}
.register-btn:hover{
  background:gold;color:black;
  transform:scale(1.05);
}

/* Badges */
.badges{
  margin-top:28px;
  display:flex;
  flex-direction:column;
  gap:10px;
  font-size:13px;
  color:#ddd;
}

/* Testimonials */
.testimonials{
  margin-top:30px;
  font-size:14px;
  line-height:1.6;
  color:#ccc;
}

.disclaimer{
  font-size:12px;
  color:#777;
  margin-top:25px;
  line-height:1.5;
}

/* Sticky Bottom Button */
.sticky-join{
  position:fixed;
  bottom:0;
  left:0;
  width:100%;
  padding:15px;
  background:linear-gradient(90deg,gold,#ffcc00);
  text-align:center;
  font-weight:bold;
  color:black;
  cursor:pointer;
  z-index:10;
}

/* Floating Telegram Button */
.telegram-float{
  position:fixed;
  bottom:80px;
  right:20px;
  width:55px;
  height:55px;
  background:#0088cc;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:22px;
  color:white;
  box-shadow:0 0 15px rgba(0,136,204,0.8);
  cursor:pointer;
  animation:pulse 2s infinite;
}
@keyframes pulse{
  0%{box-shadow:0 0 10px rgba(0,136,204,0.5);}
  50%{box-shadow:0 0 25px rgba(0,136,204,1);}
  100%{box-shadow:0 0 10px rgba(0,136,204,0.5);}
}

/* Mobile Optimization */
@media(max-width:480px){
  .container{
    margin:50px 18px;
    padding:30px 22px;
  }
  h1{font-size:24px;}
  .logo-wrapper{width:115px;height:115px;}
}
</style>
</head>
<body>

<canvas id="chart"></canvas>

<div class="container">
  <h1>🔥 TEZZA VIP</h1>

  <div class="logo-wrapper">
    <img src="tezzad.png" class="vip-logo">
  </div>

  <div class="subtitle">Kerala’s Premium vip Community</div>

  <div class="profit">
    Today’s Profit Generated: ₹<span id="profitCount">12500</span>
  </div>

  <div class="timer">
    Offer Ends In: <span id="countdown"></span>
  </div>

  <button class="btn join-btn" onclick="joinTelegram()">JOIN VIP TELEGRAM NOW</button>
  <button class="btn register-btn" onclick="registerNow()">REGISTER NOW</button>

  <div class="badges">
    <div>🏆 450+ Members</div>
    <div>📈 High Accuracy</div>
    <div>💎 VIP Strategy</div>
  </div>

  <div class="testimonials">
    “Joined 2 weeks ago. Amazing signals!” – Rahul
  </div>

  <div class="disclaimer">
    Trading involves financial risk. Please trade responsibly.
  </div>
</div>

<div class="telegram-float" onclick="joinTelegram()">✈</div>
<div class="sticky-join" onclick="joinTelegram()">JOIN TEZZA VIP NOW</div>

<script>
/* Floating particles */
for(let i=0;i<40;i++){
  let p=document.createElement("div");
  p.className="particle";
  p.style.left=Math.random()*100+"%";
  p.style.animationDuration=(6+Math.random()*6)+"s";
  document.body.appendChild(p);
}

/* Countdown */
var timeLeft=600;
setInterval(function(){
  var m=Math.floor(timeLeft/60);
  var s=timeLeft%60;
  s=s<10?"0"+s:s;
  document.getElementById("countdown").innerHTML=m+":"+s;
  timeLeft--;
},1000);

/* Profit Counter */
let profit=12500;
setInterval(()=>{
  profit+=Math.floor(Math.random()*80);
  document.getElementById("profitCount").innerText=profit;
},3000);

/* Animated Chart Background */
const canvas=document.getElementById("chart");
const ctx=canvas.getContext("2d");

function resizeCanvas(){
  canvas.width=window.innerWidth;
  canvas.height=window.innerHeight;
}
resizeCanvas();
window.addEventListener("resize",resizeCanvas);

let points=[];
for(let i=0;i<80;i++){points.push(Math.random()*canvas.height);}
function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.beginPath();
  ctx.moveTo(0,points[0]);
  for(let i=1;i<points.length;i++){
    ctx.lineTo(i*20,points[i]);
    points[i]+=Math.random()*6-3;
  }
  ctx.strokeStyle="#00ff99";
  ctx.shadowColor="#00ff99";
  ctx.shadowBlur=15;
  ctx.stroke();
  requestAnimationFrame(draw);
}
draw();

/* Links */
function joinTelegram(){
  window.location.href="https://t.me/earnwithtezzaaaa";
}
function registerNow(){
  window.location.href="https://nexawin.site/#/register?invitationCode=0812452262227";
}
</script>

</body>
</html>
